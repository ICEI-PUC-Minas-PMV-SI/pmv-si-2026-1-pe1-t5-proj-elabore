<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-LABORE - Login/Cadastro</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <section class="auth-card" aria-labelledby="login-title">
        <div class="brand" aria-label="e-LABORE">
          <span class="brand-mark">/</span>
          <span>e-LABORE</span>
        </div>

        <h1 id="login-title">Login/Cadastro</h1>
        <p>Use um acesso simples para continuar preenchendo seu currículo profissional.</p>

        <div class="segment" role="tablist" aria-label="Alternar login e cadastro">
          <button class="active" type="button" data-auth-tab="login">Entrar</button>
          <button type="button" data-auth-tab="signup">Criar conta</button>
        </div>

        <form class="form-grid">
          <div class="field" data-name-field hidden>
            <label for="nome">Nome</label>
            <input id="nome" name="nome" type="text" placeholder="Seu nome">
          </div>

          <div class="field">
            <label for="email">E-mail</label>
            <input id="email" name="email" type="email" placeholder="seuemail@exemplo.com">
          </div>

          <div class="field">
            <label for="senha">Senha</label>
            <input id="senha" name="senha" type="password" placeholder="********">
          </div>

          <button class="btn auth-submit" type="submit" data-dev-button>Entrar e continuar</button>
        </form>

        <span class="auth-note" data-auth-helper>Ainda não tem conta? Crie seu cadastro</span>
      </section>
    </main>

    <nav class="nav-arrows" data-nav-arrows aria-label="Navegação entre telas"></nav>
    <script src="navigation.js"></script>
  </body>
</html>
