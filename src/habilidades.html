<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Habilidades</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="top-nav">

        <div class="nav">

            <a href="detalhes.html">Seus Detalhes</a>
            <a href="minibio.html">Mini-Bio</a>
            <a href="experiencia.html">Experiência</a>
            <a href="educacao.html">Educação</a>
            <a href="#" class="active">Habilidades</a>

        </div>

    </div>

    <div class="container">

        <div class="left">

            <h1>Habilidades</h1>

            <div class="input-group">
                <label>Digite uma habilidade</label>
                <input type="text" id="skill">
            </div>

            <button onclick="adicionarSkill()">
                Adicionar
            </button>

        </div>

        <div class="right">

            <div class="cv">

                <h2>Minhas Habilidades</h2>

                <div class="skills" id="listaSkills"></div>

            </div>

        </div>

    </div>

    <script>

        function adicionarSkill(){

            let skill =
            document.getElementById("skill").value;

            if(skill == ""){
                return;
            }

            let div =
            document.createElement("div");

            div.className = "skill";

            div.innerText = skill;

            document.getElementById("listaSkills")
            .appendChild(div);

            document.getElementById("skill").value = "";

        }

    </script>

</body>
</html>
