<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habilidades — CV Builder</title>

    <!-- Estilos compartilhados entre as três páginas -->
    <link rel="stylesheet" href="style3.css">
</head>
<body>

    <!-- ================================================
         NAVEGAÇÃO SUPERIOR
    ================================================ -->
    <nav class="top-nav">
        <a href="detalhes.html" class="tab">Seus Detalhes</a>
        <a href="minibio.html" class="tab">Mini-Bio</a>
        <a href="experiencia.html" class="tab">Experiência</a>
        <a href="educacao.html" class="tab">Educação</a>
        <a href="habilidades.html" class="tab ativo">Habilidades</a>
    </nav>

    <!-- ================================================
         CONTEÚDO PRINCIPAL
    ================================================ -->
    <div class="main">

        <!-- Painel do formulário -->
        <div class="painel-form">
            <h1 class="titulo">Habilidades</h1>
            <p class="subtitulo">Destaque seis a oito de suas principais habilidades.</p>

            <!-- Categoria 1: Conhecimentos de Indústria -->
            <div class="card-categoria">
                <div class="categoria-titulo">Conhecimentos de Indústria:</div>

                <!--
                    .tags-area é o container onde as tags aparecem.
                    O onclick foca o input ao final para que o usuário
                    possa digitar clicando em qualquer parte da área.
                -->
                <div class="tags-area" id="area-industria" onclick="focarInput('input-industria')">
                    <!-- As tags são inseridas aqui pelo JavaScript -->
                    <input
                        type="text"
                        class="tag-input"
                        id="input-industria"
                        placeholder="Digite e pressione Enter..."
                        onkeydown="aoApertarTecla(event, 'industria')">
                </div>
            </div>

            <!-- Categoria 2: Ferramentas & Tecnologias -->
            <div class="card-categoria">
                <div class="categoria-titulo">Ferramentas &amp; Tecnologias:</div>
                <div class="tags-area" id="area-ferramentas" onclick="focarInput('input-ferramentas')">
                    <input
                        type="text"
                        class="tag-input"
                        id="input-ferramentas"
                        placeholder="Digite e pressione Enter..."
                        onkeydown="aoApertarTecla(event, 'ferramentas')">
                </div>
            </div>

            <!-- Categoria 3: Outras Skills -->
            <div class="card-categoria">
                <div class="categoria-titulo">Outras Skills:</div>
                <div class="tags-area" id="area-outras" onclick="focarInput('input-outras')">
                    <input
                        type="text"
                        class="tag-input"
                        id="input-outras"
                        placeholder="Digite e pressione Enter..."
                        onkeydown="aoApertarTecla(event, 'outras')">
                </div>
            </div>

        </div>

        <!-- Painel de pré-visualização do currículo -->
        <div class="painel-preview">
            <div class="cv" id="preview-cv"></div>
        </div>

    </div>

    <!-- ================================================
         NAVEGAÇÃO INFERIOR
    ================================================ -->
    <div class="bottom-nav">
        <button class="btn-voltar" onclick="location.href='educacao.html'">Voltar</button>
        <button class="btn-avancar" onclick="location.href='preview.html'">Salvar &amp; Avançar</button>
    </div>


    <!-- ================================================
         JAVASCRIPT
    ================================================ -->
    <script>

        /* -----------------------------------------------
           DADOS PADRÃO
        ----------------------------------------------- */
        var dadosPadrao = {
            nome: "Ana Paula Santos",
            titulo: "Analista de Marketing Digital",
            cidade: "Belo Horizonte, MG",
            telefone: "(31) 99876-5432",
            email: "ana.santos@email.com",
            bio: "Trabalho com marketing digital, organizo campanhas e acompanho indicadores para melhorar a comunicação com clientes.",
            experiencias: [
                {
                    id: 1,
                    cargo: "Analista de Marketing Digital",
                    empresa: "Agência Horizonte",
                    local: "Belo Horizonte, MG",
                    inicio: "02/2021",
                    fim: "Presente",
                    atividades: ["Planejei campanhas digitais para pequenas empresas."]
                }
            ],
            educacao: [
                {
                    id: 1,
                    curso: "Publicidade e Propaganda",
                    instituicao: "PUC Minas",
                    local: "Belo Horizonte, MG",
                    ano: "2021",
                    destaques: ["Projeto final com foco em campanhas digitais"]
                }
            ],
            habilidades: {
                industria: ["Marketing Digital", "Gestão de Campanhas", "Redes Sociais", "Comunicação", "Atendimento ao Cliente", "Análise de Resultados"],
                ferramentas: ["Google Analytics", "Meta Ads", "Google Ads", "Canva", "RD Station", "Excel"],
                outras: ["Organização", "Escrita", "Trabalho em Equipe"]
            }
        };


        /* -----------------------------------------------
           lerDados()
           Lê os dados do localStorage.
        ----------------------------------------------- */
        function aplicarExemploBrasileiro(dados) {
            if (dados.cidade === "Daca, Bangladesh" || dados.telefone === "+880 123 456 7890" || dados.email === "maksud@musemind.agency") {
                if (dados.nome === "Maksud Alam") dados.nome = "Ana Paula Santos";
                if (dados.titulo === "Designer de Produto Senior" || dados.titulo === "Designer de Produto Sénior" || dados.titulo === "Designer de Produto Sênior") dados.titulo = "Analista de Marketing Digital";
                if (dados.cidade === "Daca, Bangladesh") dados.cidade = "Belo Horizonte, MG";
                if (dados.telefone === "+880 123 456 7890") dados.telefone = "(31) 99876-5432";
                if (dados.email === "maksud@musemind.agency") dados.email = "ana.santos@email.com";
                dados.bio = "Trabalho com marketing digital, organizo campanhas e acompanho indicadores para melhorar a comunicação com clientes.";
                dados.experiencias = JSON.parse(JSON.stringify(dadosPadrao.experiencias));
                dados.educacao = JSON.parse(JSON.stringify(dadosPadrao.educacao));
                dados.habilidades = JSON.parse(JSON.stringify(dadosPadrao.habilidades));
            }
            return dados;
        }

        function lerDados() {
            var salvo = localStorage.getItem("curriculo");
            var dados = salvo ? JSON.parse(salvo) : JSON.parse(JSON.stringify(dadosPadrao));
            dados = aplicarExemploBrasileiro(dados);
            salvarDados(dados);
            return dados;
        }


        /* -----------------------------------------------
           salvarDados(dados)
           Grava os dados no localStorage.
        ----------------------------------------------- */
        function salvarDados(dados) {
            localStorage.setItem("curriculo", JSON.stringify(dados));
        }


        /* -----------------------------------------------
           renderizarCategoria(categoria)
           Recria as tags visuais de uma categoria
           dentro da sua .tags-area correspondente.
           Parâmetro: "industria", "ferramentas" ou "outras".
        ----------------------------------------------- */
        function renderizarCategoria(categoria) {
            var dados = lerDados();
            var lista = dados.habilidades[categoria] || [];
            var area = document.getElementById("area-" + categoria);
            var input = document.getElementById("input-" + categoria);

            /* Remove as tags antigas (mantém o input no lugar) */
            var tagsAntigas = area.querySelectorAll(".tag");
            tagsAntigas.forEach(function(tag) { tag.remove(); });

            /* Cria uma tag para cada habilidade salva */
            lista.forEach(function(habilidade) {
                var tag = document.createElement("span");
                tag.className = "tag";

                /* O botão × chama removerHabilidade com o nome exato */
                tag.innerHTML =
                    escaparHtml(habilidade)
                  + '<button class="tag-remover" title="Remover" onclick="removerHabilidade(\'' + categoria + '\', ' + JSON.stringify(habilidade) + ')">&times;</button>';

                /* Insere a tag antes do input (para o input ficar sempre no final) */
                area.insertBefore(tag, input);
            });
        }


        /* -----------------------------------------------
           renderizarTodas()
           Renderiza as três categorias de uma vez
           e atualiza o preview do currículo.
        ----------------------------------------------- */
        function renderizarTodas() {
            renderizarCategoria("industria");
            renderizarCategoria("ferramentas");
            renderizarCategoria("outras");
            renderizarPreview();
        }


        /* -----------------------------------------------
           adicionarHabilidade(categoria, valor)
           Adiciona uma nova habilidade à categoria
           informada e salva no localStorage.
        ----------------------------------------------- */
        function adicionarHabilidade(categoria, valor) {
            valor = valor.trim();
            if (valor === "") return;

            var dados = lerDados();
            var lista = dados.habilidades[categoria] || [];

            /* Checa se a habilidade já existe (ignora maiúsculas) */
            var jaExiste = lista.some(function(h) {
                return h.toLowerCase() === valor.toLowerCase();
            });

            if (!jaExiste) {
                lista.push(valor);
                dados.habilidades[categoria] = lista;
                salvarDados(dados);
            }

            /* Limpa o campo de texto após adicionar */
            document.getElementById("input-" + categoria).value = "";
            renderizarTodas();
        }


        /* -----------------------------------------------
           removerHabilidade(categoria, valor)
           Remove a habilidade com o valor exato
           informado da categoria correspondente.
        ----------------------------------------------- */
        function removerHabilidade(categoria, valor) {
            var dados = lerDados();
            dados.habilidades[categoria] = (dados.habilidades[categoria] || []).filter(function(h) {
                return h !== valor;
            });
            salvarDados(dados);
            renderizarTodas();
        }


        /* -----------------------------------------------
           aoApertarTecla(evento, categoria)
           Detecta teclas no input de cada categoria:
           — Enter ou vírgula → adiciona a habilidade
           — Backspace com campo vazio → remove a última
        ----------------------------------------------- */
        function aoApertarTecla(evento, categoria) {
            var input = evento.target;

            if (evento.key === "Enter" || evento.key === ",") {
                evento.preventDefault();
                /* Remove a vírgula se ela fizer parte do valor */
                adicionarHabilidade(categoria, input.value.replace(/,$/, ""));
            }

            if (evento.key === "Backspace" && input.value === "") {
                var dados = lerDados();
                var lista = dados.habilidades[categoria] || [];
                if (lista.length > 0) {
                    /* Remove o último item da lista */
                    lista.pop();
                    dados.habilidades[categoria] = lista;
                    salvarDados(dados);
                    renderizarTodas();
                }
            }
        }


        /* -----------------------------------------------
           focarInput(id)
           Coloca o foco no input da categoria clicada.
           Chamado quando o usuário clica na .tags-area.
        ----------------------------------------------- */
        function focarInput(id) {
            document.getElementById(id).focus();
        }


        /* -----------------------------------------------
           renderizarPreview()
           Monta o mini-currículo e destaca a seção
           de Habilidades (que está sendo editada agora).
        ----------------------------------------------- */
        function renderizarPreview() {
            var dados = lerDados();
            var preview = document.getElementById("preview-cv");
            var hab = dados.habilidades;

            /* Experiências (resumidas) */
            var expHtml = "";
            dados.experiencias.forEach(function(exp) {
                expHtml +=
                    '<div class="cv-item">'
                  + '<div class="cv-item-titulo">' + escaparHtml(exp.cargo) + ', ' + escaparHtml(exp.empresa) + '</div>'
                  + '<div class="cv-item-meta">' + escaparHtml(exp.inicio) + ' &ndash; ' + escaparHtml(exp.fim) + '</div>'
                  + '</div>';
            });

            /* Educação (resumida) */
            var eduHtml = "";
            dados.educacao.forEach(function(edu) {
                eduHtml +=
                    '<div class="cv-item">'
                  + '<div class="cv-item-titulo">' + escaparHtml(edu.curso) + '</div>'
                  + '<div class="cv-item-meta">' + escaparHtml(edu.instituicao || "") + (edu.ano ? " (" + escaparHtml(edu.ano) + ")" : "") + '</div>'
                  + '</div>';
            });

            /* Habilidades por categoria */
            var habHtml =
                '<div class="cv-hab-titulo">Ind&uacute;stria:</div>'
              + '<div class="cv-hab-lista">' + escaparHtml((hab.industria || []).slice(0, 6).join(", ")) + '</div>'
              + '<div class="cv-hab-titulo">Ferramentas:</div>'
              + '<div class="cv-hab-lista">' + escaparHtml((hab.ferramentas || []).slice(0, 5).join(", ")) + '</div>'
              + '<div class="cv-hab-titulo">Outras:</div>'
              + '<div class="cv-hab-lista">' + escaparHtml((hab.outras || []).join(", ")) + '</div>';

            preview.innerHTML =
                '<div class="cv-header">'
              + '<img class="cv-foto" src="https://i.pravatar.cc/80?img=11" alt="Foto">'
              + '<div>'
              + '<div class="cv-nome">' + escaparHtml(dados.nome || "Seu Nome") + '</div>'
              + '<div class="cv-cargo-txt">' + escaparHtml(dados.titulo || "Seu Cargo") + '</div>'
              + '</div>'
              + '<div class="cv-contato">'
              + escaparHtml(dados.cidade || "") + '<br>'
              + escaparHtml(dados.telefone || "") + '<br>'
              + escaparHtml(dados.email || "")
              + '</div>'
              + '</div>'
              + '<div class="cv-secao">'
              + '<div class="cv-label-col"><div class="cv-label">SOBRE</div></div>'
              + '<div class="cv-corpo"><div class="cv-bio">' + escaparHtml(dados.bio || "") + '</div></div>'
              + '</div>'
              + (expHtml !== ""
                  ? '<div class="cv-secao">'
                  + '<div class="cv-label-col"><div class="cv-label">EXP.</div></div>'
                  + '<div class="cv-corpo">'
                  + '<div class="cv-sec-titulo">Experiência</div>'
                  + expHtml
                  + '</div>'
                  + '</div>'
                  : "")
              /* Rodapé: Educação à esquerda e Habilidades à direita (ativa) */
              + '<div class="cv-rodape">'
              + '<div class="cv-col">'
              + '<div class="cv-sec-titulo">Educação</div>'
              + (eduHtml || '<span style="font-size:6px;color:#ccc;">Nenhuma formação.</span>')
              + '</div>'
              + '<div class="cv-col">'
              + '<div class="cv-sec-titulo ativo">Habilidades</div>'
              + habHtml
              + '</div>'
              + '</div>';
        }


        /* -----------------------------------------------
           escaparHtml(texto)
           Evita que caracteres especiais HTML
           quebrem a renderização da página.
        ----------------------------------------------- */
        function escaparHtml(texto) {
            return String(texto)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;");
        }


        /* -----------------------------------------------
           INICIALIZAÇÃO
        ----------------------------------------------- */
        if (!localStorage.getItem("curriculo")) {
            salvarDados(JSON.parse(JSON.stringify(dadosPadrao)));
        }

        renderizarTodas();

    </script>
</body>
</html>
