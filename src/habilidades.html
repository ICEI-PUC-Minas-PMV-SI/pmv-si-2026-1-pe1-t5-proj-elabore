<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Habilidades</title>

    <link rel="stylesheet" href="styles.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background:#f3f3f3;
            overflow-x:hidden;
        }

        .top-nav{
            width:100%;
            background:white;
            padding:18px;
            border-bottom:1px solid #ddd;
        }

        .nav{
            display:flex;
            justify-content:center;
            gap:10px;
        }

        .nav a{
            text-decoration:none;
            color:#444;
            background:#ececec;
            padding:12px 22px;
            border-radius:30px;
            font-weight:600;
        }

        .active{
            background:#dfe7ff !important;
            color:#2c4bdb !important;
        }

        .container{
            display:flex;
            min-height:100vh;
        }

        .left{
            width:55%;
            background:white;
            padding:50px;
        }

        .right{
            width:45%;
            display:flex;
            justify-content:center;
            padding:40px;
        }

        .cv{
            width:100%;
            max-width:400px;
            background:white;
            border-radius:20px;
            padding:35px;
            box-shadow:0 8px 30px rgba(0,0,0,0.08);
        }

        .input-group{
            margin-bottom:22px;
        }

        .input-group label{
            display:block;
            margin-bottom:8px;
            font-weight:600;
        }

        .input-group input{
            width:100%;
            padding:16px;
            border:1px solid #ddd;
            border-radius:14px;
            font-size:16px;
        }

        button{
            background:#2c4bdb;
            color:white;
            border:none;
            padding:16px 30px;
            border-radius:14px;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
        }

        .skills{
            margin-top:25px;
        }

        .skill{
            display:inline-block;
            background:#edf0ff;
            color:#2c4bdb;
            padding:10px 16px;
            border-radius:999px;
            margin:5px;
            font-weight:600;
        }

        @media(max-width:1000px){

            .container{
                flex-direction:column;
            }

            .left,
            .right{
                width:100%;
            }
        }

        @media(max-width:700px){

            .top-nav{
                overflow-x:auto;
            }

            .nav{
                min-width:max-content;
                justify-content:flex-start;
            }

            .left{
                padding:30px 20px;
            }

            .right{
                padding:20px;
            }

            button{
                width:100%;
            }
        }

    </style>

</head>

<body>

    <div class="top-nav">

        <div class="nav">

            <a href="detalhes.html">Seus Detalhes</a>
            <a href="minibio.html">Mini-Bio</a>
            <a href="experiencia.html">Experiência</a>
            <a href="educacao.html">Educação</a>
            <a href="#" class="active">Habilidades</a>

        </div>

    </div>

    <div class="container">

        <div class="left">

            <h1>Habilidades</h1>

            <div class="input-group">
                <label>Digite uma habilidade</label>
                <input type="text" id="skill">
            </div>

            <button onclick="adicionarSkill()">
                Adicionar
            </button>

        </div>

        <div class="right">

            <div class="cv">

                <h2>Minhas Habilidades</h2>

                <div class="skills" id="listaSkills"></div>

            </div>

        </div>

    </div>

    <script>

        function adicionarSkill(){

            let skill =
            document.getElementById("skill").value;

            if(skill == ""){
                return;
            }

            let div =
            document.createElement("div");

            div.className = "skill";

            div.innerText = skill;

            document.getElementById("listaSkills")
            .appendChild(div);

            document.getElementById("skill").value = "";

        }

    </script>

    <nav class="nav-arrows" data-nav-arrows aria-label="Navegação entre telas"></nav>
    <script src="navigation.js"></script>

</body>
</html>
