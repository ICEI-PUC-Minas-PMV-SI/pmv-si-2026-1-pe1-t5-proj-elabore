<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Educação</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="top-nav">

        <div class="nav">

            <a href="detalhes.html">Seus Detalhes</a>
            <a href="minibio.html">Mini-Bio</a>
            <a href="experiencia.html">Experiência</a>
            <a href="#" class="active">Educação</a>
            <a href="habilidades.html">Habilidades</a>

        </div>

    </div>

    <div class="container">

        <div class="left">

            <h1>Educação</h1>

            <p>Adicione sua formação acadêmica.</p>

            <div class="input-group">
                <label>Curso</label>
                <input type="text" id="curso">
            </div>

            <div class="input-group">
                <label>Instituição</label>
                <input type="text" id="instituicao">
            </div>

            <div class="input-group">
                <label>Descrição</label>
                <textarea id="descricao"></textarea>
            </div>

            <button onclick="atualizarPreview()">
                Salvar & Avançar
            </button>

        </div>

        <div class="right">

            <div class="cv">

                <h2 id="previewCurso">
                    Seu Curso
                </h2>

                <h3 id="previewInstituicao">
                    Sua Instituição
                </h3>

                <p id="previewDescricao">
                    Sua formação acadêmica aparecerá aqui.
                </p>

            </div>

        </div>

    </div>

    <script>

        function atualizarPreview(){

            document.getElementById("previewCurso").innerText =
            document.getElementById("curso").value;

            document.getElementById("previewInstituicao").innerText =
            document.getElementById("instituicao").value;

            document.getElementById("previewDescricao").innerText =
            document.getElementById("descricao").value;

        }

    </script>

</body>
</html>
