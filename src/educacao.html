<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educação — CV Builder</title>

    <!-- Estilos compartilhados entre as três páginas -->
    <link rel="stylesheet" href="styles3.css">
</head>
<body>

    <!-- ================================================
         NAVEGAÇÃO SUPERIOR
    ================================================ -->
    <nav class="top-nav">
        <a href="detalhes.html" class="tab">Seus Detalhes</a>
        <a href="minibio.html" class="tab">Mini-Bio</a>
        <a href="experiencia.html" class="tab">Experiência</a>
        <a href="educacao.html" class="tab ativo">Educação</a>
        <a href="habilidades.html" class="tab">Habilidades</a>
    </nav>

    <!-- ================================================
         CONTEÚDO PRINCIPAL
    ================================================ -->
    <div class="main">

        <!-- Painel do formulário -->
        <div class="painel-form">
            <h1 class="titulo">Educação</h1>
            <p class="subtitulo">Revise seu histórico educacional.</p>

            <!-- Os cards de formação são inseridos aqui pelo JavaScript -->
            <div id="lista-educacao"></div>

            <!-- Botão para abrir o modal de nova formação -->
            <button class="btn-add" onclick="abrirModal()">
                <span class="circulo-mais">+</span>
                Adicionar Educação
            </button>
        </div>

        <!-- Painel de pré-visualização do currículo -->
        <div class="painel-preview">
            <div class="cv" id="preview-cv"></div>
        </div>

    </div>

    <!-- ================================================
         NAVEGAÇÃO INFERIOR
    ================================================ -->
    <div class="bottom-nav">
        <button class="btn-voltar" onclick="location.href='experiencia.html'">Voltar</button>
        <button class="btn-avancar" onclick="location.href='habilidades.html'">Salvar &amp; Avançar</button>
    </div>

    <!-- ================================================
         MODAL — ADICIONAR / EDITAR FORMAÇÃO
    ================================================ -->
    <div class="modal-fundo" id="modal-fundo" onclick="fecharAoClicarFora(event)">
        <div class="modal">

            <h2 class="modal-titulo" id="modal-titulo">Adicionar Educação</h2>

            <div class="campo">
                <label for="campo-curso">Curso / Formação</label>
                <input type="text" id="campo-curso" placeholder="Ex: Publicidade e Propaganda">
            </div>

            <div class="campo">
                <label for="campo-instituicao">Instituição</label>
                <input type="text" id="campo-instituicao" placeholder="Ex: PUC Minas">
            </div>

            <div class="linha-dupla">
                <div class="campo">
                    <label for="campo-local">Localização</label>
                    <input type="text" id="campo-local" placeholder="Ex: Belo Horizonte, MG">
                </div>
                <div class="campo">
                    <label for="campo-ano">Ano de Conclusão</label>
                    <input type="text" id="campo-ano" placeholder="Ex: 2013">
                </div>
            </div>

            <div class="campo">
                <label for="campo-destaques">Destaques</label>
                <textarea id="campo-destaques" placeholder="Projeto final com foco em campanhas digitais&#10;Participação em projetos de extensão..."></textarea>
                <p class="dica">Um destaque por linha.</p>
            </div>

            <div class="modal-acoes">
                <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
                <button class="btn-salvar" onclick="salvarFormacao()">Salvar</button>
            </div>

        </div>
    </div>


    <!-- ================================================
         JAVASCRIPT
    ================================================ -->
    <script>

        /* -----------------------------------------------
           DADOS PADRÃO
        ----------------------------------------------- */
        var dadosPadrao = {
            nome: "Ana Paula Santos",
            titulo: "Analista de Marketing Digital",
            cidade: "Belo Horizonte, MG",
            telefone: "(31) 99876-5432",
            email: "ana.santos@email.com",
            bio: "Trabalho com marketing digital, organizo campanhas e acompanho indicadores para melhorar a comunicação com clientes.",
            experiencias: [
                {
                    id: 1,
                    cargo: "Analista de Marketing Digital",
                    empresa: "Agência Horizonte",
                    local: "Belo Horizonte, MG",
                    inicio: "02/2021",
                    fim: "Presente",
                    atividades: ["Planejei campanhas digitais para pequenas empresas."]
                }
            ],
            educacao: [
                {
                    id: 1,
                    curso: "Publicidade e Propaganda",
                    instituicao: "PUC Minas",
                    local: "Belo Horizonte, MG",
                    ano: "2021",
                    destaques: ["Projeto final com foco em campanhas digitais"]
                },
                {
                    id: 2,
                    curso: "Curso de Marketing Digital",
                    instituicao: "SENAC Minas",
                    local: "Belo Horizonte, MG",
                    ano: "2023",
                    destaques: ["Projeto final com foco em campanhas digitais"]
                }
            ],
            habilidades: { industria: [], ferramentas: [], outras: [] }
        };


        /* -----------------------------------------------
           lerDados()
           Lê os dados do localStorage. Se estiver vazio,
           retorna uma cópia dos dados padrão.
        ----------------------------------------------- */
        function aplicarExemploBrasileiro(dados) {
            if (dados.cidade === "Daca, Bangladesh" || dados.telefone === "+880 123 456 7890" || dados.email === "maksud@musemind.agency") {
                if (dados.nome === "Maksud Alam") dados.nome = "Ana Paula Santos";
                if (dados.titulo === "Designer de Produto Senior" || dados.titulo === "Designer de Produto Sénior" || dados.titulo === "Designer de Produto Sênior") dados.titulo = "Analista de Marketing Digital";
                if (dados.cidade === "Daca, Bangladesh") dados.cidade = "Belo Horizonte, MG";
                if (dados.telefone === "+880 123 456 7890") dados.telefone = "(31) 99876-5432";
                if (dados.email === "maksud@musemind.agency") dados.email = "ana.santos@email.com";
                dados.bio = "Trabalho com marketing digital, organizo campanhas e acompanho indicadores para melhorar a comunicação com clientes.";
                dados.experiencias = JSON.parse(JSON.stringify(dadosPadrao.experiencias));
                dados.educacao = JSON.parse(JSON.stringify(dadosPadrao.educacao));
            }
            return dados;
        }

        function lerDados() {
            var salvo = localStorage.getItem("curriculo");
            var dados = salvo ? JSON.parse(salvo) : JSON.parse(JSON.stringify(dadosPadrao));
            dados = aplicarExemploBrasileiro(dados);
            salvarDados(dados);
            return dados;
        }


        /* -----------------------------------------------
           salvarDados(dados)
           Grava os dados no localStorage.
        ----------------------------------------------- */
        function salvarDados(dados) {
            localStorage.setItem("curriculo", JSON.stringify(dados));
        }


        /* -----------------------------------------------
           renderizarLista()
           Lê as formações salvas e exibe cada uma
           como um card. Também atualiza o preview.
        ----------------------------------------------- */
        function renderizarLista() {
            var dados = lerDados();
            var container = document.getElementById("lista-educacao");

            container.innerHTML = "";

            dados.educacao.forEach(function(edu) {

                /* Monta a linha de metadados ignorando campos vazios */
                var partes = [];
                if (edu.instituicao) partes.push(edu.instituicao);
                if (edu.local) partes.push(edu.local);
                if (edu.ano) partes.push(edu.ano);
                var metaTxt = partes.join(" &bull; ");

                /* Monta os itens de destaque */
                var destaquesHtml = "";
                edu.destaques.forEach(function(d) {
                    destaquesHtml += "<li>" + escaparHtml(d) + "</li>";
                });

                var card = document.createElement("div");
                card.className = "card";
                card.innerHTML =
                    '<div class="card-acoes">'
                  + '<button class="btn-icone" title="Editar" onclick="abrirModalEdicao(' + edu.id + ')">'
                  + iconeLapis()
                  + '</button>'
                  + '<button class="btn-icone deletar" title="Excluir" onclick="excluirFormacao(' + edu.id + ')">'
                  + iconeLixo()
                  + '</button>'
                  + '</div>'
                  + '<div class="card-titulo">' + escaparHtml(edu.curso) + '</div>'
                  + '<div class="card-meta">' + metaTxt + '</div>'
                  + '<ul class="card-bullets">' + destaquesHtml + '</ul>';

                container.appendChild(card);
            });

            renderizarPreview();
        }


        /* -----------------------------------------------
           renderizarPreview()
           Monta o mini-currículo com os dados salvos
           e destaca visualmente a seção de Educação.
        ----------------------------------------------- */
        function renderizarPreview() {
            var dados = lerDados();
            var preview = document.getElementById("preview-cv");

            /* Monta as experiências (resumidas) */
            var expHtml = "";
            dados.experiencias.forEach(function(exp) {
                expHtml +=
                    '<div class="cv-item">'
                  + '<div class="cv-item-titulo">' + escaparHtml(exp.cargo) + ', ' + escaparHtml(exp.empresa) + '</div>'
                  + '<div class="cv-item-meta">' + escaparHtml(exp.inicio) + ' &ndash; ' + escaparHtml(exp.fim) + '</div>'
                  + '</div>';
            });

            /* Monta a educação (seção ativa nesta página) */
            var eduHtml = "";
            dados.educacao.forEach(function(edu) {
                var dHtml = "";
                if (edu.destaques.length > 0) {
                    dHtml = "<li style='font-size:5.5px;color:#444;'>" + escaparHtml(edu.destaques[0]) + "</li>";
                }
                eduHtml +=
                    '<div class="cv-item">'
                  + '<div class="cv-item-titulo">' + escaparHtml(edu.curso) + (edu.ano ? " &mdash; " + escaparHtml(edu.ano) : "") + '</div>'
                  + '<div class="cv-item-meta">' + escaparHtml(edu.instituicao || "") + '</div>'
                  + '<ul style="list-style:disc;padding-left:7px;">' + dHtml + '</ul>'
                  + '</div>';
            });

            if (eduHtml === "") {
                eduHtml = '<span style="font-size:6px;color:#ccc;">Nenhuma formação cadastrada.</span>';
            }

            preview.innerHTML =
                '<div class="cv-header">'
              + '<img class="cv-foto" src="https://i.pravatar.cc/80?img=11" alt="Foto">'
              + '<div>'
              + '<div class="cv-nome">' + escaparHtml(dados.nome || "Seu Nome") + '</div>'
              + '<div class="cv-cargo-txt">' + escaparHtml(dados.titulo || "Seu Cargo") + '</div>'
              + '</div>'
              + '<div class="cv-contato">'
              + escaparHtml(dados.cidade || "") + '<br>'
              + escaparHtml(dados.telefone || "") + '<br>'
              + escaparHtml(dados.email || "")
              + '</div>'
              + '</div>'
              + '<div class="cv-secao">'
              + '<div class="cv-label-col"><div class="cv-label">SOBRE</div></div>'
              + '<div class="cv-corpo"><div class="cv-bio">' + escaparHtml(dados.bio || "") + '</div></div>'
              + '</div>'
              + (expHtml !== ""
                  ? '<div class="cv-secao">'
                  + '<div class="cv-label-col"><div class="cv-label">EXP.</div></div>'
                  + '<div class="cv-corpo">'
                  + '<div class="cv-sec-titulo">Experiência</div>'
                  + expHtml
                  + '</div>'
                  + '</div>'
                  : "")
              + '<div class="cv-secao">'
              + '<div class="cv-label-col"><div class="cv-label">EDU.</div></div>'
              + '<div class="cv-corpo">'
              + '<div class="cv-sec-titulo ativo">Educação</div>'
              + eduHtml
              + '</div>'
              + '</div>';
        }


        /* -----------------------------------------------
           Variável de controle do modal.
        ----------------------------------------------- */
        var idEmEdicao = null;


        /* -----------------------------------------------
           abrirModal()
           Abre o modal com campos em branco para
           adicionar uma nova formação.
        ----------------------------------------------- */
        function abrirModal() {
            idEmEdicao = null;
            document.getElementById("modal-titulo").textContent = "Adicionar Educação";
            document.getElementById("campo-curso").value = "";
            document.getElementById("campo-instituicao").value = "";
            document.getElementById("campo-local").value = "";
            document.getElementById("campo-ano").value = "";
            document.getElementById("campo-destaques").value = "";
            document.getElementById("modal-fundo").classList.add("aberto");
            document.getElementById("campo-curso").focus();
        }


        /* -----------------------------------------------
           abrirModalEdicao(id)
           Abre o modal já preenchido com os dados
           da formação cujo ID foi passado.
        ----------------------------------------------- */
        function abrirModalEdicao(id) {
            var dados = lerDados();
            var edu = dados.educacao.find(function(e) { return e.id === id; });
            if (!edu) return;

            idEmEdicao = id;
            document.getElementById("modal-titulo").textContent = "Editar Educação";
            document.getElementById("campo-curso").value = edu.curso;
            document.getElementById("campo-instituicao").value = edu.instituicao || "";
            document.getElementById("campo-local").value = edu.local || "";
            document.getElementById("campo-ano").value = edu.ano || "";
            document.getElementById("campo-destaques").value = edu.destaques.join("\n");
            document.getElementById("modal-fundo").classList.add("aberto");
            document.getElementById("campo-curso").focus();
        }


        /* -----------------------------------------------
           fecharModal()
           Fecha o modal.
        ----------------------------------------------- */
        function fecharModal() {
            document.getElementById("modal-fundo").classList.remove("aberto");
            idEmEdicao = null;
        }


        /* -----------------------------------------------
           fecharAoClicarFora(evento)
           Fecha o modal ao clicar no fundo escuro.
        ----------------------------------------------- */
        function fecharAoClicarFora(evento) {
            if (evento.target === document.getElementById("modal-fundo")) {
                fecharModal();
            }
        }


        /* -----------------------------------------------
           salvarFormacao()
           Lê os campos do modal e salva a formação
           (nova ou editada) no localStorage.
        ----------------------------------------------- */
        function salvarFormacao() {
            var curso = document.getElementById("campo-curso").value.trim();
            var instituicao = document.getElementById("campo-instituicao").value.trim();
            var local = document.getElementById("campo-local").value.trim();
            var ano = document.getElementById("campo-ano").value.trim();
            var textoD = document.getElementById("campo-destaques").value.trim();

            if (!curso) {
                alert("Preencha o nome do curso ou formação.");
                return;
            }

            /* Cada linha do textarea vira um destaque */
            var destaques = textoD
                .split("\n")
                .map(function(linha) { return linha.trim(); })
                .filter(function(linha) { return linha !== ""; });

            var dados = lerDados();

            if (idEmEdicao !== null) {
                var indice = dados.educacao.findIndex(function(e) { return e.id === idEmEdicao; });
                if (indice !== -1) {
                    dados.educacao[indice] = {
                        id: idEmEdicao, curso: curso, instituicao: instituicao,
                        local: local, ano: ano, destaques: destaques
                    };
                }
            } else {
                dados.educacao.push({
                    id: Date.now(), curso: curso, instituicao: instituicao,
                    local: local, ano: ano, destaques: destaques
                });
            }

            salvarDados(dados);
            fecharModal();
            renderizarLista();
        }


        /* -----------------------------------------------
           excluirFormacao(id)
           Remove a formação com o ID informado.
        ----------------------------------------------- */
        function excluirFormacao(id) {
            if (!confirm("Deseja remover esta formação?")) return;
            var dados = lerDados();
            dados.educacao = dados.educacao.filter(function(e) { return e.id !== id; });
            salvarDados(dados);
            renderizarLista();
        }


        /* -----------------------------------------------
           escaparHtml(texto)
           Evita que caracteres HTML especiais
           quebrem a renderização da página.
        ----------------------------------------------- */
        function escaparHtml(texto) {
            return String(texto)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;");
        }

        function iconeLapis() {
            return '<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">'
                 + '<path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>'
                 + '<path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>'
                 + '</svg>';
        }

        function iconeLixo() {
            return '<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">'
                 + '<polyline points="3 6 5 6 21 6"/>'
                 + '<path d="M19 6l-1 14H6L5 6"/>'
                 + '<path d="M10 11v6M14 11v6"/>'
                 + '<path d="M9 6V4h6v2"/>'
                 + '</svg>';
        }


        /* -----------------------------------------------
           INICIALIZAÇÃO
        ----------------------------------------------- */
        if (!localStorage.getItem("curriculo")) {
            salvarDados(JSON.parse(JSON.stringify(dadosPadrao)));
        }

        renderizarLista();

    </script>
</body>
</html>
