<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Experiência</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="top-nav">

        <div class="nav">

            <a href="detalhes.html">Seus Detalhes</a>
            <a href="minibio.html">Mini-Bio</a>
            <a href="#" class="active">Experiência</a>
            <a href="educacao.html">Educação</a>
            <a href="habilidades.html">Habilidades</a>

        </div>

    </div>

    <div class="container">

        <div class="left">

            <h1>Experiência</h1>

            <p>Adicione sua experiência profissional.</p>

            <div class="input-group">
                <label>Cargo</label>
                <input type="text" id="cargo">
            </div>

            <div class="input-group">
                <label>Empresa</label>
                <input type="text" id="empresa">
            </div>

            <div class="input-group">
                <label>Descrição</label>
                <textarea id="descricao"></textarea>
            </div>

            <button onclick="atualizarPreview()">
                Salvar & Avançar
            </button>

        </div>

        <div class="right">

            <div class="cv">

                <h2 id="previewCargo">
                    Seu Cargo
                </h2>

                <h3 id="previewEmpresa">
                    Sua Empresa
                </h3>

                <p id="previewDescricao">
                    Sua descrição aparecerá aqui.
                </p>

            </div>

        </div>

    </div>

    <script>

        function atualizarPreview(){

            document.getElementById("previewCargo").innerText =
            document.getElementById("cargo").value;

            document.getElementById("previewEmpresa").innerText =
            document.getElementById("empresa").value;

            document.getElementById("previewDescricao").innerText =
            document.getElementById("descricao").value;

        }

    </script>

</body>
</html>
